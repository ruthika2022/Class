<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Galaxy Catcher Game</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Segoe UI',sans-serif;
}

body{
background:linear-gradient(135deg,#050816,#0b1026);
overflow:hidden;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
color:white;
}

#gameContainer{
width:100%;
max-width:900px;
height:100vh;
position:relative;
overflow:hidden;
}

h1{
text-align:center;
padding:10px;
}

#hud{
display:flex;
justify-content:space-around;
padding:15px;
background:rgba(255,255,255,0.1);
backdrop-filter:blur(10px);
font-weight:bold;
}

#basket{
width:90px;
height:40px;
background:linear-gradient(45deg,#00f5ff,#00a2ff);
position:absolute;
bottom:20px;
left:50%;
transform:translateX(-50%);
border-radius:20px;
box-shadow:0 0 20px cyan;
transition:0.05s;
}

.object{
position:absolute;
font-size:35px;
animation:fall linear forwards;
}

@keyframes fall{
from{
transform:translateY(-50px);
}
to{
transform:translateY(100vh);
}
}

.screen{
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.85);
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
z-index:100;
}

.hidden{
display:none;
}

button{
padding:15px 30px;
border:none;
border-radius:30px;
background:#00d4ff;
color:white;
font-size:18px;
cursor:pointer;
transition:.3s;
margin-top:20px;
}

button:hover{
transform:scale(1.1);
background:#00ff95;
}

.big{
font-size:3rem;
margin-bottom:20px;
}

#mobileControls{
position:absolute;
bottom:80px;
width:100%;
display:none;
justify-content:space-between;
padding:20px;
}

.controlBtn{
width:70px;
height:70px;
border-radius:50%;
background:rgba(255,255,255,0.2);
font-size:30px;
display:flex;
align-items:center;
justify-content:center;
}


.box{
    background: linear-gradient(135deg, #2563eb, #4f46e5);
    border: none;
    border-radius: 12px;
    padding: 14px 30px;
    cursor: pointer;
    transition: all 0.3s ease;
    box-shadow: 0 5px 15px rgba(37, 99, 235, 0.3);
}

.box a{
    text-decoration: none;
    color: white;
    font-size: 16px;
    font-weight: 600;
    display: block;
}

.box:hover{
    transform: translateY(-4px) scale(1.05);
    box-shadow: 0 10px 25px rgba(37, 99, 235, 0.4);
}

.box:active{
    transform: translateY(0);
}

@media(max-width:768px){
#mobileControls{
display:flex;
}
}
</style>
</head>
<body>

<div id="gameContainer">

<div id="hud">
<div>⭐ Score: <span id="score">0</span></div>
<div>🏆 High: <span id="highScore">0</span></div>
<div>🎯 Level: <span id="level">1</span></div>
<div>⏱️ Time: <span id="timer">60</span></div>
</div>

<div id="basket"></div>

<div id="mobileControls">
<div class="controlBtn" id="leftBtn">⬅</div>
<div class="controlBtn" id="rightBtn">➡</div>
</div>

<!-- Start Screen -->
<div class="screen" id="startScreen">
<h1 class="big">🌌 Galaxy Catcher</h1>
<p>Catch Stars ⭐ and avoid Bombs 💣</p>
<button onclick="startGame()">Start Game</button>
</div>

<!-- Game Over -->
<div class="screen hidden" id="gameOverScreen">
<h1 class="big">💥 Game Over</h1>
<h2 id="finalScore"></h2>
<button onclick="restartGame()">Play Again</button>
</div>

<!-- Win Screen -->
<div class="screen hidden" id="winScreen">
<h1 class="big">🏆 You Win!</h1>
<h2 id="winScore"></h2>
<button onclick="restartGame()">Play Again</button>
</div>

</div>
    <button class="box"><a href="./index.html">Back</a></button>

<script>

// ============================
// VARIABLES
// ============================

const game = document.getElementById("gameContainer");
const basket = document.getElementById("basket");

const scoreEl = document.getElementById("score");
const levelEl = document.getElementById("level");
const timerEl = document.getElementById("timer");
const highScoreEl = document.getElementById("highScore");

let score = 0;
let level = 1;
let time = 60;

let basketX = window.innerWidth / 2;
let gameRunning = false;

let objects = [];
let spawnInterval;
let timerInterval;

// ============================
// LOCAL STORAGE
// ============================

let highScore =
localStorage.getItem("galaxyHighScore") || 0;

highScoreEl.textContent = highScore;

// ============================
// SOUND EFFECTS
// ============================

function playSound(freq,duration){

const audioCtx =
new(window.AudioContext ||
window.webkitAudioContext)();

const osc = audioCtx.createOscillator();

osc.type="sine";
osc.frequency.value=freq;

osc.connect(audioCtx.destination);

osc.start();

setTimeout(()=>{
osc.stop();
},duration);

}

// ============================
// START GAME
// ============================

function startGame(){

document.getElementById("startScreen")
.classList.add("hidden");

gameRunning=true;

spawnInterval=setInterval(spawnObject,1000);

timerInterval=setInterval(()=>{

time--;
timerEl.textContent=time;

if(time<=0){

if(score>=100){
winGame();
}
else{
gameOver();
}

}

},1000);

}

// ============================
// CREATE OBJECTS
// ============================

function spawnObject(){

const item=document.createElement("div");

item.classList.add("object");

let isBomb=Math.random()<0.25;

item.innerHTML=isBomb?"💣":"⭐";

let x=Math.random()*
(window.innerWidth-50);

item.style.left=x+"px";

let speed=Math.max(
3,
7-level*0.3
);

item.style.animationDuration=
speed+"s";

game.appendChild(item);

objects.push({
element:item,
x:x,
isBomb:isBomb
});

}

// ============================
// COLLISION CHECK LOOP
// ============================

setInterval(()=>{

if(!gameRunning) return;

objects.forEach((obj,index)=>{

let rect=
obj.element.getBoundingClientRect();

let basketRect=
basket.getBoundingClientRect();

if(

rect.bottom >= basketRect.top &&
rect.left < basketRect.right &&
rect.right > basketRect.left

){

if(obj.isBomb){

playSound(150,200);

gameOver();

}
else{

playSound(700,100);

score+=10;

scoreEl.textContent=score;

obj.element.remove();

objects.splice(index,1);

if(score%50===0){

level++;
levelEl.textContent=level;

playSound(1000,300);

}

}

}

if(rect.top>window.innerHeight){

obj.element.remove();

objects.splice(index,1);

}

});

},50);

// ============================
// MOVE BASKET
// ============================

document.addEventListener("mousemove",(e)=>{

basketX=e.clientX;

basket.style.left=basketX+"px";

});

document.addEventListener("touchmove",(e)=>{

basketX=e.touches[0].clientX;

basket.style.left=basketX+"px";

});

// Keyboard Controls

document.addEventListener("keydown",(e)=>{

if(e.key==="ArrowLeft"){

basketX-=40;

}

if(e.key==="ArrowRight"){

basketX+=40;

}

basket.style.left=basketX+"px";

});

// Mobile Buttons

document.getElementById("leftBtn")
.addEventListener("click",()=>{

basketX-=40;
basket.style.left=basketX+"px";

});

document.getElementById("rightBtn")
.addEventListener("click",()=>{

basketX+=40;
basket.style.left=basketX+"px";

});

// ============================
// GAME OVER
// ============================

function gameOver(){

gameRunning=false;

clearInterval(spawnInterval);
clearInterval(timerInterval);

updateHighScore();

document.getElementById("finalScore")
.innerHTML="Score: "+score;

document.getElementById("gameOverScreen")
.classList.remove("hidden");

}

// ============================
// WIN GAME
// ============================

function winGame(){

gameRunning=false;

clearInterval(spawnInterval);
clearInterval(timerInterval);

updateHighScore();

document.getElementById("winScore")
.innerHTML="Score: "+score;

document.getElementById("winScreen")
.classList.remove("hidden");

playSound(1200,500);

}

// ============================
// HIGH SCORE
// ============================

function updateHighScore(){

if(score>highScore){

highScore=score;

localStorage.setItem(
"galaxyHighScore",
highScore
);

highScoreEl.textContent=
highScore;

}

}

// ============================
// RESTART GAME
// ============================

function restartGame(){

location.reload();

}

</script>

</body>
</html>
